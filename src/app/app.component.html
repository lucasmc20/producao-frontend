@if (auth.estaAutenticado()) {
  <mat-sidenav-container class="min-h-screen">
    <mat-sidenav mode="side" opened class="w-64 sidenav-shell">
      <div class="sidenav-header">
        <img src="assets/logo-lcs.png" alt="Logo LCS" class="sidenav-logo" />
        <p class="sidenav-system-name">Sistema de Gestão<br>de Produção</p>
        <p class="sidenav-username">{{ auth.usuario()?.nome }}</p>
      </div>

      <mat-nav-list>
        <a mat-list-item routerLink="/ordens" routerLinkActive="active-link" class="sidenav-nav-item">
          <mat-icon matListItemIcon>assignment</mat-icon>
          <span matListItemTitle>Ordens de Produção</span>
        </a>
        <a mat-list-item routerLink="/monitoramento" routerLinkActive="active-link" class="sidenav-nav-item">
          <mat-icon matListItemIcon>monitoring</mat-icon>
          <span matListItemTitle>Monitoramento</span>
        </a>
        @if (auth.perfilAtual() === 'GESTOR' || auth.perfilAtual() === 'ADMINISTRADOR') {
          <a mat-list-item routerLink="/inventario" routerLinkActive="active-link" class="sidenav-nav-item">
            <mat-icon matListItemIcon>inventory_2</mat-icon>
            <span matListItemTitle>Inventário</span>
          </a>
          <a mat-list-item routerLink="/usuarios" routerLinkActive="active-link" class="sidenav-nav-item">
            <mat-icon matListItemIcon>manage_accounts</mat-icon>
            <span matListItemTitle>Usuários</span>
          </a>
        }
      </mat-nav-list>

      <div class="sidenav-footer">
        <button mat-button class="sidenav-logout-btn" (click)="encerrarSessao()">
          <mat-icon>logout</mat-icon>
          Sair
        </button>
      </div>
    </mat-sidenav>

    <mat-sidenav-content class="bg-fabrica-fundo">
      <router-outlet />
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <router-outlet />
}
